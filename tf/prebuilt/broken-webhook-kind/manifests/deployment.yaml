# Fixture for the broken-webhook task: a small workload that is healthy at
# first. setup.sh deletes its pod after installing the broken webhook, so the
# ReplicaSet's attempt to recreate it is what actually surfaces the failure.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: checkout
  labels:
    app: checkout-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: busybox:1.36
          command: ["/bin/sh", "-c", "sleep 3600"]
