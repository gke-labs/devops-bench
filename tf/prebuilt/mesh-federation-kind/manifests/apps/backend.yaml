# Backend workload — applied to cluster-2 only. A tiny HTTP echo that identifies
# itself as the cluster-2 instance, so a successful cross-cluster call from
# cluster-1 is observable in the response body. Sidecar is injected via the
# `sample` namespace's istio-injection label.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sample
  labels:
    app: backend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:0.2.3
          args:
            - "-listen=:8080"
            - "-text=hello from backend in cluster-2"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
