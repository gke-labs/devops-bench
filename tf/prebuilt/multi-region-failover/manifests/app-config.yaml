# Application configuration consumed by the backend. This object (and app-secret) is
# the per-region config that is supposed to be replicated to every cluster. It is
# present in the primary region and seeded into the GitOps repo, but intentionally
# left out of the standby region (the drift the agent reconciles after failover).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: storefront
data:
  APP_ENV: "production"
  FEATURE_FLAGS: "checkout,search,recommendations"
  CATALOG_REFRESH_SECONDS: "30"
