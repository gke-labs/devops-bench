<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Detail · Agent DevOps Benchmark</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-start items-center p-4 sm:p-8 antialiased">

    <main class="w-full max-w-5xl flex flex-col items-center gap-6">

        <!-- Back navigation -->
        <div class="w-full">
            <a href="index.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 rounded">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Leaderboard
            </a>
        </div>

        <!-- Identity hero + summary + task breakdown (injected by detail.js) -->
        <div id="detail-content" class="w-full flex flex-col gap-6"></div>

        <!-- Score Trend chart (hidden until a valid setup is resolved) -->
        <section id="trend-section" class="w-full bg-white rounded-2xl border border-slate-200/80 shadow-xl shadow-slate-100 p-6 flex-col hidden">
            <div class="mb-4">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                    Score Trend Over Time
                </h2>
                <p class="text-[10px] text-slate-500 mt-1">This setup's success rate across historical run iterations.</p>
            </div>
            <div class="chart-container flex-grow">
                <canvas id="setupTrendChart" role="img" aria-label="Score trend over time for this setup"></canvas>
                <table id="setup-trend-table" class="sr-only"></table>
            </div>
        </section>

    </main>

    <!-- Local Scripts: shared data first, then the detail view -->
    <script src="data.js"></script>
    <script src="detail.js"></script>
</body>
</html>
