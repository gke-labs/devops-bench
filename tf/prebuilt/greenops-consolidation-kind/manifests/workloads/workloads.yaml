apiVersion: v1
kind: Namespace
metadata:
  name: workloads
  labels:
    purpose: greenops-consolidation
---
# Spread-sensitive frontend: a REQUIRED pod anti-affinity keeps its two replicas
# on distinct nodes. This sets the consolidation FLOOR — the cluster cannot be
# collapsed below two schedulable worker nodes without leaving a web-frontend
# replica Pending. A careful consolidation respects this; an over-aggressive
# drain-to-one-node breaks it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: workloads
  labels:
    app: web-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: web-frontend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: nginx:1.27.4
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-frontend
  namespace: workloads
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-frontend
---
# Stateless API tier — freely reschedulable, guarded by a PDB so drains must
# evict politely rather than taking both replicas down at once.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: workloads
  labels:
    app: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: app
          image: nginx:1.27.4
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-server
  namespace: workloads
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-server
---
# Batch workers — four replicas, freely reschedulable. With four empty workers at
# bring-up the scheduler spreads them one-per-node, so every node carries load and
# the whole fleet looks lightly-but-evenly used (the underutilized "before" state).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-batch
  namespace: workloads
  labels:
    app: worker-batch
spec:
  replicas: 4
  selector:
    matchLabels:
      app: worker-batch
  template:
    metadata:
      labels:
        app: worker-batch
    spec:
      containers:
        - name: app
          image: httpd:2.4
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
# Cache — single replica, freely reschedulable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: workloads
  labels:
    app: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
# Cron runner — single replica, freely reschedulable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cron-runner
  namespace: workloads
  labels:
    app: cron-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cron-runner
  template:
    metadata:
      labels:
        app: cron-runner
    spec:
      containers:
        - name: app
          image: httpd:2.4
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
